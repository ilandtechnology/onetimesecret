name: Deploy Docker Compose to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      resource_group:
        description: 'Azure resource group for the target Web App'
        required: false
        default: ''
      image_tag:
        description: 'Optional image tag to use instead of commit SHA'
        required: false
        default: ''

permissions:
  contents: read
  id-token: write

env:
  ACR_NAME: acrotsprdeus2
  ACR_SUFFIX: hnatabdhb3cad0ba
  ACR_LOGIN_SERVER: acrotsprdeus2-hnatabdhb3cad0ba.azurecr.io
  WEBAPP_NAME: app-ots-prd-eus2-01
  BUILD_TARGETS: main,caddy

jobs:
  deploy:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Login to Azure using OIDC
        uses: azure/login@v2
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-id: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Configure resource group
        id: rg
        run: |
          if [[ -n "${{ github.event.inputs.resource_group }}" ]]; then
            echo "resource_group=${{ github.event.inputs.resource_group }}" >> $GITHUB_OUTPUT
          elif [[ -n "${{ secrets.AZURE_RESOURCE_GROUP }}" ]]; then
            echo "resource_group=${{ secrets.AZURE_RESOURCE_GROUP }}" >> $GITHUB_OUTPUT
          else
            echo "Missing Azure resource group. Set workflow input or secret AZURE_RESOURCE_GROUP." >&2
            exit 1
          fi

      - name: Compute image tag
        id: image_tag
        run: |
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        run: az acr login --name $ACR_NAME --suffix $ACR_SUFFIX

      - name: Build and push app + proxy images
        run: |
          docker buildx bake -f docker/bake.hcl $BUILD_TARGETS --push \
            --set 'REGISTRY_MODE=custom' \
            --set 'CUSTOM_REGISTRY=$ACR_LOGIN_SERVER' \
            --set 'IMAGE_TAG=${{ steps.image_tag.outputs.tag }}' \
            --set 'EXTRA_TAGS=${{ steps.image_tag.outputs.tag }}' \
            --set 'VERSION=${{ steps.image_tag.outputs.tag }}' \
            --set 'COMMIT_HASH=${{ steps.image_tag.outputs.tag }}'

      - name: Install PyYAML
        run: python -m pip install pyyaml

      - name: Generate Azure-compatible compose file
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import yaml

          src = Path('docker/compose/docker-compose.full.yml')
          dest = Path('azure-docker-compose.yml')
          data = yaml.safe_load(src.read_text())

          registry = os.environ['ACR_LOGIN_SERVER']
          tag = os.environ['IMAGE_TAG']

          def scrub(service):
              if not service:
                  return
              for key in ['volumes', 'env_file', 'container_name', 'build', 'stdin_open', 'tty']:
                  service.pop(key, None)

          proxy = data['services']['proxy']
          scrub(proxy)
          proxy['image'] = f'{registry}/onetimesecret/onetimesecret-caddy:{tag}'

          app = data['services']['app']
          scrub(app)
          app['image'] = f'{registry}/onetimesecret/onetimesecret:{tag}'

          for service_name in ['maindb', 'rabbitmq', 'worker-email', 'scheduler']:
              scrub(data['services'].get(service_name))

          data.pop('volumes', None)
          data.pop('networks', None)

          dest.write_text(yaml.safe_dump(data, sort_keys=False), encoding='utf-8')
          print(f'Generated {dest}')
          PY
        env:
          ACR_LOGIN_SERVER: ${{ env.ACR_LOGIN_SERVER }}
          IMAGE_TAG: ${{ steps.image_tag.outputs.tag }}

      - name: Deploy Docker Compose to Azure Web App
        run: |
          az webapp config container set \
            --resource-group ${{ steps.rg.outputs.resource_group }} \
            --name $WEBAPP_NAME \
            --multicontainer-config-type compose \
            --multicontainer-config-file azure-docker-compose.yml

      - name: Restart Azure Web App
        run: az webapp restart --resource-group ${{ steps.rg.outputs.resource_group }} --name $WEBAPP_NAME
