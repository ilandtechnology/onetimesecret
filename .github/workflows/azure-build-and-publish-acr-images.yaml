# .github/workflows/build-and-publish-oci-images.yml

name: Build and Publish Images to ACR

## Azure Container Registry image tagging strategy:
## Release tags (v1.0.0): v<version> + latest
## Release candidates (v1.0.0-rc1): v<version> + next
## Branch push: <branch-name> + edge
## Develop branch: next
## Manual dispatch: dev (or version_tag if provided)
## Scheduled (nightly): nightly
##
## IMAGE_TAG carries the v-prefixed version for release builds;
## empty for non-release builds (only EXTRA_TAGS apply).
##
## Architecture:
## Uses docker/bake-action with docker/bake.hcl to build all image
## variants in a single job. Bake resolves the dependency graph
## (base → dependencies → build → final) automatically.
##
## Authentication:
## Uses OIDC (OpenID Connect) with Azure Federated Credentials.
## No secrets (client_secret) are stored — the GitHub Actions runner
## exchanges a short-lived OIDC token for an Azure access token.
##
## Required GitHub Configuration:
##   Secrets:
##     AZURE_CLIENT_ID         App Registration (client) ID
##     AZURE_TENANT_ID         Entra ID tenant ID
##     AZURE_SUBSCRIPTION_ID   Azure subscription ID
##     ACR_NAME                ACR resource name (e.g., "myregistry")
##     ACR_LOGIN_SERVER        ACR login server (e.g., "myregistry.azurecr.io")
##     ACR_SUFFIX              ACR suffix for sovereign clouds (e.g., ".azurecr.io")
##
## Debug Logging (Repository Variables):
##   ACTIONS_STEP_DEBUG=true    Enable purple debug output for all steps
##   ACTIONS_RUNNER_DEBUG=true  Enable runner diagnostic logging
##   Set in Settings → Secrets and variables → Actions → Variables
##
## Sentry Integration (Repository Secrets):
##   SENTRY_AUTH_TOKEN   API token with project:releases and org:read scopes
##   SENTRY_ORG          Organization slug (e.g., "onetimesecret")
##   SENTRY_URL          Sentry instance URL (omit for sentry.io)
##   SENTRY_PROJECTS     Space-separated project slugs
##   These enable: release creation, commit association, sourcemap upload,
##   and deploy notifications. All Sentry steps use continue-on-error so
##   missing secrets won't fail the build.

on:
  push:
    tags: ['v*']
  pull_request:
    types: [closed]
    branches: ['develop', 'feature/*', 'rel/*']
    paths-ignore:
      - '**'
  schedule:
    # Nightly build at 03:00 UTC (off-peak hours)
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      source_branch:
        type: string
        description: 'Branch to build from (defaults to the branch selected in the UI)'
        required: false
        default: ''
      version_tag:
        type: string
        description: 'Version tag for the image (e.g., "0.18.0-beta.1"). Does NOT create a git tag.'
        required: false
        default: ''
      registry_target:
        type: choice
        description: 'Target registry for built images'
        required: false
        default: 'custom'
        options:
          - 'custom'
          - 'public'
      debug_enabled:
        type: boolean
        description: 'Enable debug mode for build troubleshooting'
        required: false
        default: false
      platforms:
        type: choice
        description: 'Target platforms'
        required: false
        default: 'linux/amd64,linux/arm64'
        options:
          - ''
          - 'linux/amd64,linux/arm64'
          - 'linux/amd64'
          - 'linux/arm64'

permissions:
  contents: read
  id-token: write   # OIDC — required for azure/login with federated credentials

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  ACR_NAME: ${{ secrets.ACR_NAME }}
  ACR_SUFFIX: ${{ secrets.ACR_SUFFIX }}

jobs:
  build-and-publish:
    name: Build and Publish Images to ACR
    runs-on: ubuntu-24.04

    steps:
      # ──────────────────────────────────────────────
      # 1. Checkout
      # ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_branch || github.ref }}
          fetch-depth: 0

      # ──────────────────────────────────────────────
      # 2. Set up Node.js (for package.json version)
      # ──────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      # ──────────────────────────────────────────────
      # 3. Get commit short SHA
      # ──────────────────────────────────────────────
      - name: Get commit short SHA
        id: commit
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "${SHORT_SHA}" > .commit_hash.txt
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Short SHA: ${SHORT_SHA}"

      # ──────────────────────────────────────────────
      # 4. Compute and set package.json version
      # ──────────────────────────────────────────────
      - name: Compute and set package.json version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION_TAG: ${{ inputs.version_tag }}
          SHORT_SHA: ${{ steps.commit.outputs.short_sha }}
        run: |
          if [[ "$GITHUB_REF" =~ ^refs/tags/v ]]; then
            # Tag build: script auto-detects version from GITHUB_REF
            ./.github/scripts/update-version.sh
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]] && [[ -n "$INPUT_VERSION_TAG" ]]; then
            ./.github/scripts/update-version.sh "$INPUT_VERSION_TAG"
          elif [[ "$EVENT_NAME" == "schedule" ]]; then
            ./.github/scripts/update-version.sh "0.0.0-nightly.$(date -u +%Y%m%d)"
          else
            BRANCH_SLUG=$(echo "${GITHUB_REF#refs/heads/}" | sed 's|/|-|g')
            ./.github/scripts/update-version.sh "0.0.0-${BRANCH_SLUG}.${SHORT_SHA}"
          fi
          BUILD=$(node -p "require('./package.json').version")
          echo "BUILD=${BUILD}"

      # ──────────────────────────────────────────────
      # 5. Determine image tags
      # ──────────────────────────────────────────────
      - name: Determine image tags
        id: tags
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION_TAG: ${{ inputs.version_tag }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # Build comma-separated list of extra tags based on event context
          EXTRA_TAGS=""

          # Release tag (v1.0.0 → latest; v1.0.0-rc1 → next)
          if [[ "$GITHUB_REF" =~ ^refs/tags/v || "$GITHUB_REF" =~ ^refs/heads/main ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            if [[ "$TAG_NAME" == *"-rc"* ]]; then
              EXTRA_TAGS="next"
            else
              EXTRA_TAGS="latest"
            fi
          fi

          # Branch push → edge
          if [[ "$EVENT_NAME" == "push" ]] && [[ ! "$GITHUB_REF" =~ ^refs/tags/ ]]; then
            BRANCH_NAME="${GITHUB_REF#refs/heads/}"
            # Sanitize branch name for Docker tag (replace / with -)
            BRANCH_TAG=$(echo "$BRANCH_NAME" | sed 's|/|-|g')
            EXTRA_TAGS="${EXTRA_TAGS:+${EXTRA_TAGS},}${BRANCH_TAG},edge"
          fi

          # develop branch → next
          if [[ "$GITHUB_REF" == "refs/heads/develop" ]]; then
            EXTRA_TAGS="${EXTRA_TAGS:+${EXTRA_TAGS},}next"
          fi

          # Manual dispatch
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ -n "$INPUT_VERSION_TAG" ]]; then
              EXTRA_TAGS="${EXTRA_TAGS:+${EXTRA_TAGS},}${INPUT_VERSION_TAG}"
            else
              EXTRA_TAGS="${EXTRA_TAGS:+${EXTRA_TAGS},}dev"
            fi
          fi

          # Nightly schedule
          if [[ "$EVENT_NAME" == "schedule" ]]; then
            EXTRA_TAGS="${EXTRA_TAGS:+${EXTRA_TAGS},}nightly"
          fi

          # Docker image tag: v-prefixed for tag builds, empty for non-tag builds
          if [[ "$GITHUB_REF" =~ ^refs/tags/v ]]; then
            IMAGE_TAG="v${VERSION}"
          else
            IMAGE_TAG=""
          fi

          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "extra_tags=${EXTRA_TAGS}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"
          echo "Image tag: ${IMAGE_TAG}"
          echo "Extra tags: ${EXTRA_TAGS}"

      # ──────────────────────────────────────────────
      # 6. Set up QEMU (multi-arch)
      # ──────────────────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # ──────────────────────────────────────────────
      # 7. Set up Docker Buildx
      # ──────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}

      # ──────────────────────────────────────────────
      # 8. Azure Login via OIDC (Federated Credentials)
      # ──────────────────────────────────────────────
      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ──────────────────────────────────────────────
      # 9. Obtain ACR access token via az CLI
      # ──────────────────────────────────────────────
      - name: Get ACR access token
        id: acr-token
        run: |
          TOKEN=$(az acr login \
            --name "${ACR_NAME}" \
            --suffix "${ACR_SUFFIX}" \
            --expose-token \
            --output tsv \
            --query accessToken)
          echo "::add-mask::${TOKEN}"
          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"

      # ──────────────────────────────────────────────
      # 10. Docker Login to ACR (login-action@v3)
      # ──────────────────────────────────────────────
      - name: Login to Azure Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: 00000000-0000-0000-0000-000000000000
          password: ${{ steps.acr-token.outputs.token }}

      # ──────────────────────────────────────────────
      # 11. Audit — Resolved bake configuration
      # ──────────────────────────────────────────────
      - name: Audit — Resolved bake configuration
        env:
          VERSION: ${{ steps.tags.outputs.version }}
          IMAGE_TAG: ${{ steps.tags.outputs.image_tag }}
          COMMIT_HASH: ${{ steps.commit.outputs.short_sha }}
          EXTRA_TAGS: ${{ steps.tags.outputs.extra_tags }}
          PLATFORMS: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
          REGISTRY_MODE: ${{ inputs.registry_target || 'public' }}
          CUSTOM_REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
          CUSTOM_REPO: ${{ secrets.ACR_REPOSITORY }}
        run: |
          echo "::group::Bake resolved config (dry-run)"
          docker buildx bake -f docker/bake.hcl --print ci 2>&1 || true
          echo "::endgroup::"
          echo "::group::package.json version in build context"
          node -p "require('./package.json').version"
          echo "::endgroup::"

      # ──────────────────────────────────────────────
      # 12. Build and push images Bake
      # ──────────────────────────────────────────────
      - name: Build and push images Bake
        uses: docker/bake-action@v7
        env:
          VERSION: ${{ steps.tags.outputs.version }}
          IMAGE_TAG: ${{ steps.tags.outputs.image_tag }}
          EXTRA_TAGS: ${{ steps.tags.outputs.extra_tags }}
          COMMIT_HASH: ${{ steps.commit.outputs.short_sha }}
          PLATFORMS: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
          REGISTRY_MODE: ${{ inputs.registry_target || 'public' }}
          CUSTOM_REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
          CUSTOM_REPO: ${{ secrets.ACR_REPOSITORY }}
        with:
          files: docker/bake.hcl
          targets: ci
          push: ${{ github.event_name != 'pull_request' }}
          set: |
            *.no-cache=true
            *.args.VERSION=${{ steps.tags.outputs.version }}
            *.args.COMMIT_HASH=${{ steps.commit.outputs.short_sha }}

      # ──────────────────────────────────────────────
      # 13. Audit - Verify pushed images
      # ──────────────────────────────────────────────
      - name: Audit - Verify images in ACR
        if: success()
        env:
          BUILD_VERSION: ${{ steps.tags.outputs.version }}
          BUILD_IMAGE_TAG: ${{ steps.tags.outputs.image_tag }}
          BUILD_EXTRA_TAGS: ${{ steps.tags.outputs.extra_tags }}
          REGISTRY_MODE: ${{ inputs.registry_target || 'public' }}
          CUSTOM_REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
          CUSTOM_REPO: ${{ secrets.ACR_REPOSITORY }}
        run: |
          set -euo pipefail

          # Determine image reference to inspect
          if [ "${REGISTRY_MODE}" = "custom" ] && [ -n "${CUSTOM_REGISTRY}" ]; then
            REGISTRY_PREFIX="${CUSTOM_REGISTRY}/${CUSTOM_REPO}"
          else
            REGISTRY_PREFIX="ghcr.io/${CUSTOM_REPO}"
          fi

          # Use IMAGE_TAG if available (release builds), otherwise first EXTRA_TAG
          if [ -n "${BUILD_IMAGE_TAG}" ]; then
            IMAGE_REF="${REGISTRY_PREFIX}:${BUILD_IMAGE_TAG}"
          else
            FIRST_TAG=$(echo "${BUILD_EXTRA_TAGS}" | cut -d',' -f1 | tr -d ' ')
            IMAGE_REF="${REGISTRY_PREFIX}:${FIRST_TAG}"
          fi

          echo "::group::Image version check (${IMAGE_REF})"
          podman pull "${IMAGE_REF}" --quiet
          ACTUAL_VERSION=$(podman run --rm --entrypoint cat "${IMAGE_REF}" package.json \
            | grep -o '"version": "[^"]*"' || echo '"version": "UNKNOWN"')
          echo "Expected: ${BUILD_VERSION}"
          echo "Actual:   ${ACTUAL_VERSION}"
          echo "::endgroup::"

      # ──────────────────────────────────────────────
      # 14. Output build summary
      # ──────────────────────────────────────────────
      - name: Output build summary
        env:
          BUILD_PLATFORMS: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
          BUILD_VERSION: ${{ steps.tags.outputs.version }}
          BUILD_IMAGE_TAG: ${{ steps.tags.outputs.image_tag }}
          BUILD_COMMIT: ${{ steps.commit.outputs.short_sha }}
          BUILD_EXTRA_TAGS: ${{ steps.tags.outputs.extra_tags }}
          CUSTOM_REPO: ${{ secrets.ACR_REPOSITORY }}
        run: |
          {
            BUILD_IMAGE_TAG_VERIFIED=$(az acr repository show-tags --name "${ACR_NAME}" --suffix "${ACR_SUFFIX}" --repository "${CUSTOM_REPO}" --orderby time_desc --top 1 --output tsv)
            echo "## ACR Image Build Complete"
            echo ""
            echo "**Bake file:** docker/bake.hcl"
            echo "**Targets:** ci (main, s6, lite)"
            echo "**Platforms:** ${BUILD_PLATFORMS}"
            echo "**Version:** ${BUILD_VERSION}"
            echo "**Image tag:** ${BUILD_IMAGE_TAG:-*(none — non-tag build)*}"
            echo "**Commit:** ${BUILD_COMMIT}"
            echo "**Extra tags:** ${BUILD_EXTRA_TAGS}"
            echo "**Tag Published:** ${BUILD_IMAGE_TAG_VERIFIED}"
          } >> "$GITHUB_STEP_SUMMARY"

      # ──────────────────────────────────────────────
      # 15. Azure logout and cleanup
      # ──────────────────────────────────────────────
      - name: Azure logout and cleanup
        if: always()
        run: |
          az logout
          az cache purge
          az account clear