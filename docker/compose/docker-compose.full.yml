##
# DOCKER COMPOSE - ONETIME SECRET (FULL STACK)
#
# Full production deployment: Caddy TLS proxy, App, Valkey, RabbitMQ,
# background workers, and scheduler.
#
# App uses pre-built images from Docker Hub. To pin a version:
#   OTS_IMAGE_TAG=v0.24.6 docker compose up
#
# Caddy proxy requires building (plugins: ratelimit, security, transform-encoder):
#   docker compose build proxy
#
# To build all services from source, use Docker Bake:
#   docker buildx bake -f docker/bake.hcl all
#
# See docker/README.md for complete setup and usage documentation.

services:
  proxy:
    # Custom Caddy build required — the Caddyfile uses caddy-ratelimit,
    # transform-encoder, and caddy-security plugins not in stock caddy:2.
    # Build: docker buildx bake -f docker/bake.hcl caddy
    build:
      context: ../..
      dockerfile: docker/variants/caddy.dockerfile
    container_name: onetime-proxy
    depends_on:
      app:
        condition: service_started
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - CERTIFICATE_EMAIL=${CERTIFICATE_EMAIL:-jonildo_santos@iland.com.br}
      - PUBLIC_DIR=/var/www/public
    logging:
      driver: 'json-file'
      options:
        max-size: '60m'
        max-file: '3'
    networks:
      - onetime-network
    ports:
      - '80:80'
      - '443:443'
    # Note: Port 2019 is NOT exposed externally - only to the other containers on the same network
    expose:
      - '2019'
    restart: unless-stopped
    volumes:
      - ../../etc/examples/Caddyfile-example:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  app:
    image: onetimesecret/onetimesecret:${OTS_IMAGE_TAG:-latest}
    container_name: onetime-app
    depends_on:
      maindb:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      - RACK_ENV=${RACK_ENV:-production}
      - VALKEY_URL=redis://maindb:6379/0
      - AUTH_DATABASE_URL=sqlite://data/auth.db
      - SECRET=${SECRET}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - AUTH_SECRET=${AUTH_SECRET:-}
      - AUTHENTICATION_MODE=${AUTHENTICATION_MODE:-full}
      - ARGON2_SECRET=${ARGON2_SECRET:-}
      - FEDERATION_SECRET=${FEDERATION_SECRET:-}
      - IDENTIFIER_SECRET=${IDENTIFIER_SECRET:-}
      - PUBLIC_DIR=/var/www/public
    entrypoint: ['./bin/entrypoint.sh']
    stdin_open: true
    tty: true
    logging:
      driver: 'json-file'
      options:
        max-size: '60m'
        max-file: '3'
    networks:
      - onetime-network
    expose:
      - '3000'
    restart: unless-stopped
    volumes:
      - ../../data:/app/data

  maindb:
    image: valkey/valkey:8.1-bookworm@sha256:fea8b3e67b15729d4bb70589eb03367bab9ad1ee89c876f54327fc7c6e618571
    container_name: onetime-maindb
    command: >
      valkey-server
      --appendonly yes
      --appendfilename onetime.aof
      --appendfsync everysec
      --dbfilename onetime.rdb
      --save 157680000 1
      --bind 0.0.0.0
      --port 6379
      --databases 1
      --timeout 30
      --loglevel notice
      --rdbcompression yes
    logging:
      driver: 'json-file'
      options:
        max-size: '60m'
        max-file: '3'
    networks:
      - onetime-network
    # Note: Port 6379 is NOT exposed externally - only to containers on the same network
    expose:
      - '6379'
    restart: unless-stopped
    volumes:
      - maindb-data:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  onetime-network:
    driver: bridge
    name: onetime-network

volumes:
  maindb-data:
    name: onetime_maindb_data
  caddy-data:
    name: onetime_caddy_data
  caddy-config:
    name: onetime_caddy_config
